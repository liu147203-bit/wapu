<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>张鹤鸣 Vibe Coding 作品集</title><style>html,body{margin:0;background:#070707;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif}main{min-height:100vh;display:grid;place-items:center;padding:24px}.box{text-align:center}.spin{width:34px;height:34px;border:2px solid #333;border-top-color:#fff;border-radius:50%;margin:0 auto 18px;animation:r 1s linear infinite}@keyframes r{to{transform:rotate(360deg)}}p{color:#999}</style></head><body><main><div class="box"><div class="spin"></div><strong>正在加载作品集</strong><p>首次打开可能需要几秒</p></div></main><script>(async()=>{try{const names=Array.from({length:15},(_,i)=>`part-${String(i).padStart(2,'0')}.txt`);const parts=await Promise.all(names.map(n=>fetch(n,{cache:'force-cache'}).then(r=>{if(!r.ok)throw new Error(n);return r.text()})));document.open();document.write(parts.join(''));document.close()}catch(e){document.body.innerHTML='<main><div class="box"><strong>作品集加载失败</strong><p>请刷新页面后重试</p></div></main>'}})();</script></body></html>
