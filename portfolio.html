<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#090909"><title>张鹤鸣｜Vibe Coding × AI 产品运营作品集</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#090909;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.loader{min-height:100vh;display:grid;place-items:center;padding:24px}.loader-inner{width:min(520px,100%);text-align:center}.mark{font:700 12px ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.18em;color:#aaa}.title{font-size:clamp(30px,7vw,58px);line-height:1.05;letter-spacing:-.045em;margin:22px 0 28px}.bar{height:2px;background:#282828;overflow:hidden}.bar i{display:block;height:100%;width:30%;background:#fff;animation:move 1.15s ease-in-out infinite}.status{font-size:13px;color:#888;margin-top:16px}@keyframes move{0%{transform:translateX(-120%)}100%{transform:translateX(440%)}}</style></head><body><main class="loader"><div class="loader-inner"><div class="mark">ZHM / VIBE CODING PORTFOLIO</div><div class="title">正在加载完整作品集</div><div class="bar"><i></i></div><div class="status" id="status">加载图片与项目内容</div></div></main><script>(async()=>{const files=Array.from({length:8},(_,i)=>`portfolio-data/chunk-${String(i).padStart(3,'0')}.txt`);try{const parts=await Promise.all(files.map(async u=>{const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw new Error(u);return r.text()}));const s=parts.join('').replace(/\s/g,'');const bin=atob(s);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);let html;if('DecompressionStream'in window){const ds=new DecompressionStream('gzip');html=await new Response(new Blob([bytes]).stream().pipeThrough(ds)).text()}else{document.getElementById('status').textContent='正在启用兼容模式';await new Promise((ok,no)=>{const x=document.createElement('script');x.src='https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js';x.onload=ok;x.onerror=no;document.head.appendChild(x)});html=new TextDecoder().decode(window.pako.ungzip(bytes))}document.open();document.write(html);document.close()}catch(e){console.error(e);document.getElementById('status').innerHTML='加载失败，请刷新页面或使用 Chrome、Edge、Safari、Firefox 打开'}})();</script></body></html>
